<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      .hint {
        color: #8b9cb3;
        margin: 0 0 1rem 0;
      }
      .auth-gate {
        margin: 0.6rem 0 1rem 0;
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid #2a394f;
        background: #131b27;
      }
      .auth-gate button {
        background: #2b5ea7;
        color: #eef6ff;
        border: 1px solid #4d83d0;
        border-radius: 6px;
        padding: 0.42rem 0.72rem;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1rem;
      }
      .panel {
        background: #161d2a;
        border: 1px solid #283244;
        border-radius: 10px;
        padding: 0.8rem;
      }
      .panel h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1rem;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
      }
      .row {
        display: grid;
        grid-template-columns: 2.2rem 1fr auto;
        gap: 0.6rem;
        align-items: center;
        margin: 0.2rem 0;
      }
      .barWrap {
        height: 0.8rem;
        background: #202a3a;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        background: linear-gradient(90deg, #5aa0ff, #7dd3fc);
      }
      .bar.bar--logout {
        background: linear-gradient(90deg, #a855f7, #f472b6);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.2rem;
        font-size: 0.86rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.42rem 0.3rem;
        border-bottom: 1px solid #263041;
      }
      th {
        color: #8b9cb3;
        font-size: 0.73rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .right {
        text-align: right;
      }
      .status {
        margin: 0.6rem 0 1rem 0;
        color: #9fb0c7;
      }
      .err {
        color: #f87171;
      }
      .chart-cols {
        display: grid;
        grid-template-columns: repeat(24, minmax(10px, 1fr));
        gap: 0.25rem;
        align-items: end;
        height: 160px;
        margin-bottom: 0.4rem;
      }
      .col {
        height: 100%;
        background: #202a3a;
        border-radius: 4px 4px 0 0;
        position: relative;
        cursor: pointer;
      }
      .col .in {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(180deg, #5aa0ff, #7dd3fc);
        border-radius: 4px 4px 0 0;
      }
      .col .out {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(180deg, #a855f7, #f472b6);
        opacity: 0.92;
        border-radius: 4px 4px 0 0;
      }
      .ticks {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 0.3rem;
        color: #8092aa;
        font-size: 0.72rem;
      }
      .hover-card {
        margin-top: 0.55rem;
        border: 1px solid #2a394f;
        border-radius: 8px;
        background: #131b27;
        padding: 0.5rem;
        min-height: 78px;
      }
      .user-row {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        gap: 0.45rem;
        align-items: center;
        margin-bottom: 0.28rem;
      }
      .ident {
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .users-list {
        max-height: 280px;
        overflow: auto;
      }
      .wallet-chip {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }
      .wallet-chip .ident {
        width: 22px;
        height: 22px;
        border-radius: 4px;
      }
      @media (max-width: 720px) {
        body.ms-site { padding-left: 0.7rem; padding-right: 0.7rem; }
        .grid { grid-template-columns: 1fr; gap: 0.8rem; }
        .panel { padding: 0.7rem; }
      }
    </style>
  </head>
  <body class="ms-site">
    <header class="ms-site-header">
      <div class="title-row">
        <div class="title-left">
          <a class="brand-title-link" href="/" title="Nimiq Space (play)">
            <span class="brand-title"><span class="brand-title__nimiq">NIMIQ</span> <span class="brand-title__space">SPACE</span></span>
          </a>
          <nav class="main-site-nav" aria-label="Main site">
            <a class="main-site-nav__link" href="/payouts">Payouts</a>
            <a class="main-site-nav__link" href="/analytics" aria-current="page" data-auth-nav="analytics" hidden>Analytics</a>
            <a class="main-site-nav__link" href="/admin" data-auth-nav="admin" hidden>Admin</a>
            <a class="main-site-nav__link" href="/admin/system" data-auth-nav="system" hidden>System</a>
            <a class="main-site-nav__link" href="/admin/settings" data-auth-nav="settings" hidden>Settings</a>
          </nav>
        </div>
        <div class="analytics-topbar">
          <div class="main-site-social" aria-label="Social links">
            <a class="main-site-social__link" href="https://x.com/nimiqspace" target="_blank" rel="noopener noreferrer" aria-label="Nimiq Space on X">
              <svg class="main-site-social__icon" viewBox="0 0 1200 1227" aria-hidden="true" focusable="false"><path d="M714.15 519.295 1160.89 0h-105.86L667.142 450.883 357.328 0H0l468.485 681.802L0 1226.37h105.866l409.627-476.155 327.179 476.155H1200L714.15 519.295Zm-145.016 168.51-47.468-67.894L144.011 79.694h162.604l304.797 436.03 47.468 67.894 396.2 566.682H892.476L569.134 687.805Z"/></svg>
            </a>
            <a class="main-site-social__link" href="https://t.me/nimiqspace" target="_blank" rel="noopener noreferrer" aria-label="Nimiq Space on Telegram">
              <svg class="main-site-social__icon" viewBox="0 0 240.1 240.1" aria-hidden="true" focusable="false"><path d="M54.3 118.8c35-15.2 58.3-25.3 70-30.2 33.3-13.9 40.3-16.3 44.8-16.4 1 0 3.2.2 4.7 1.4 1.2 1 1.5 2.3 1.7 3.3s.4 3.1.2 4.7c-1.8 19-9.6 65.1-13.6 86.3-1.7 9-5 12-8.2 12.3-7 .6-12.3-4.6-19-9-10.6-6.9-16.5-11.2-26.8-18-11.9-7.8-4.2-12.1 2.6-19.1 1.8-1.8 32.5-29.8 33.1-32.3.1-.3.1-1.5-.6-2.1-.7-.6-1.7-.4-2.5-.2-1.1.2-17.9 11.4-50.6 33.5-4.8 3.3-9.1 4.9-13 4.8-4.3-.1-12.5-2.4-18.7-4.4-7.5-2.4-13.5-3.7-13-7.9.3-2.2 3.3-4.4 8.9-6.7Z"/></svg>
            </a>
          </div>
          <div id="authUser" class="auth-user" style="display:none"></div>
        </div>
      </div>
    </header>
    <p id="status" class="status mono">Loading...</p>
    <div id="authGate" class="auth-gate mono" style="display:none"></div>
    <div id="analyticsGrid" class="grid" style="display:none">
      <section class="panel">
        <h2>Login / Logout by UTC hour</h2>
        <div id="logins"></div>
        <div id="loginHover" class="hover-card mono">Hover a bar to see unique-user breakdown.</div>
      </section>
      <section class="panel">
        <h2>NIM paid out by UTC hour</h2>
        <div id="payoutHours"></div>
        <div id="payoutHover" class="hover-card mono">Hover a bar to see users and amounts.</div>
      </section>
      <section class="panel">
        <h2>Unique visitors</h2>
        <div id="visitors" class="mono users-list"></div>
      </section>
      <section class="panel">
        <h2>Recent NIM payouts sent</h2>
        <div id="payouts" class="mono"></div>
      </section>
      <section class="panel">
        <h2>Daily totals</h2>
        <div id="daily" class="mono"></div>
      </section>
      <section class="panel">
        <h2>Active play time</h2>
        <div id="sessions" class="mono"></div>
      </section>
    </div>
    <script type="module" src="/src/analyticsStandalone.ts"></script>
  </body>
</html>
