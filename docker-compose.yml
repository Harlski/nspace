# Production stack: build context is repo root (same as Dockerfile).
# On the VPS, keep a git clone here and point env_file at a real `.env` (never commit secrets).

services:
  nspace:
    build: .
    image: nspace:latest
    restart: unless-stopped
    ports:
      # Bind locally if nginx/Caddy terminates TLS on the host
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
    volumes:
      # world-state.json and events-*.jsonl live under server/data in the app
      - ./data:/app/server/data
