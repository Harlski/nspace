# Build the image on the VPS after fast-forwarding git (simplest: no container registry).
# Prerequisites: see docs/deploy-github-docker.md (SSH keys + server deploy key + secrets).

name: Deploy Docker (backend)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Repository **Secrets** (Settings → Secrets and variables → Actions → Secrets),
      # not Variables — this workflow only reads `secrets.*`.
      # Do not inline DEPLOY_SSH_KEY here (multiline PEM breaks shell); ssh-action errors if it is missing.
      - name: Require deploy secrets
        run: |
          missing=
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="DEPLOY_HOST $missing"
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing="DEPLOY_USER $missing"
          if [ -n "$missing" ]; then
            echo "::error::These GitHub Actions **repository secrets** are empty or missing: $missing"
            echo "::error::Add them under Settings → Secrets and variables → Actions → **Secrets** (the Secrets tab, not Variables)."
            exit 1
          fi

      - name: SSH — pull, build, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            # Same path as docs/deploy-github-docker.md — change here if your clone lives elsewhere.
            cd /opt/nspace
            git fetch origin main
            git reset --hard origin/main
            docker compose build --pull
            docker compose up -d --remove-orphans
            docker image prune -f
