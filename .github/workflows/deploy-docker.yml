# Build the image on the VPS after fast-forwarding git (simplest: no container registry).
# Prerequisites: see docs/deploy-github-docker.md (SSH keys + server deploy key + secrets).

name: Deploy Docker (backend)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Use this name so `secrets.*` / `vars.*` resolve from **Settings → Environments → Production**
    # (not only from repository Actions secrets).
    environment: Production
    env:
      # Repository OR environment secrets/variables (after `environment:` above).
      DEPLOY_HOST_RESOLVED: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_USER_RESOLVED: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
    steps:
      # `DEPLOY_SSH_KEY` must be a **Secret** (private key). Host/user can be Secrets or Variables.
      - name: Require deploy host and user
        run: |
          missing=
          [ -z "$DEPLOY_HOST_RESOLVED" ] && missing="${missing}DEPLOY_HOST "
          [ -z "$DEPLOY_USER_RESOLVED" ] && missing="${missing}DEPLOY_USER "
          if [ -n "$missing" ]; then
            echo "::error::Missing deploy config: $missing"
            echo "::error::Add DEPLOY_HOST, DEPLOY_USER (and DEPLOY_SSH_KEY) either:"
            echo "::error::  • Repository: Settings → Secrets and variables → Actions, or"
            echo "::error::  • Environment: Settings → Environments → Production (same name as environment: in this workflow)."
            echo "::error::Put the SSH **private key** in **Secrets** only — never in Variables (plaintext)."
            exit 1
          fi

      - name: SSH — stop, backup data, pull, build, up
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST_RESOLVED }}
          username: ${{ env.DEPLOY_USER_RESOLVED }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            # Non-interactive SSH often has a minimal PATH; Docker is usually under /usr/bin.
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker not found (install Docker Engine + Compose v2 plugin on the VPS)."
              echo "Example (Debian/Ubuntu): sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2"
              echo "Then: sudo usermod -aG docker deployer  (log out/in), verify: docker compose version"
              exit 127
            fi
            # Same path as docs/deploy-github-docker.md — change here if your clone lives elsewhere.
            DEPLOY_ROOT=/opt/nspace
            if [ ! -d "$DEPLOY_ROOT/.git" ]; then
              echo "ERROR: $DEPLOY_ROOT is not a git repository (no .git)."
              echo "One-time on the VPS (as deployer, with GitHub deploy key for git@github.com):"
              echo "  sudo mkdir -p $DEPLOY_ROOT && sudo chown deployer:deployer $DEPLOY_ROOT"
              echo "  cd $DEPLOY_ROOT && git clone git@github.com:${{ github.repository }}.git ."
              exit 1
            fi
            cd "$DEPLOY_ROOT"
            # Optional: 60s in-game countdown (see docs/deploy-github-docker.md — set DEPLOY_RESTART_HOOK_SECRET in .env).
            if [ -f "$DEPLOY_ROOT/.env" ]; then
              set -a
              # shellcheck source=/dev/null
              . "$DEPLOY_ROOT/.env"
              set +a
            fi
            if [ -n "${DEPLOY_RESTART_HOOK_SECRET:-}" ]; then
              echo "Notifying connected players (60s) via pre-deploy hook…"
              # Do not use curl -f: 404 means "no hook on this binary yet" (deploy before this route shipped)
              # or "not_configured" (secret not in the running container env). Deploy must still succeed.
              HOOK_CODE=$(curl -sS --max-time 25 -o /dev/null -w "%{http_code}" -X POST \
                "http://127.0.0.1:3001/api/hooks/pre-deploy-restart" \
                -H "Authorization: Bearer ${DEPLOY_RESTART_HOOK_SECRET}" \
                -H "Content-Type: application/json" \
                -d '{"etaSeconds":60,"message":"Deploying a new version — brief disconnect ahead."}' \
                2>/dev/null || echo "000")
              HOOK_CODE=${HOOK_CODE//[^0-9]/}
              HOOK_CODE=${HOOK_CODE:-000}
              if [ "$HOOK_CODE" = "200" ]; then
                echo "Hook OK (HTTP 200). Waiting 60s for countdown…"
                sleep 60
              elif [ "$HOOK_CODE" = "404" ]; then
                echo "WARN: pre-deploy hook HTTP 404 (old server build without route, or hook disabled / secret not in process). Skipping 60s wait."
                sleep 3
              else
                echo "WARN: pre-deploy hook HTTP ${HOOK_CODE:-?} (connection refused, auth, or server error). Continuing in 5s…"
                sleep 5
              fi
            else
              echo "DEPLOY_RESTART_HOOK_SECRET not set in .env — skipping pre-stop player notice."
            fi
            # Graceful stop so nspace receives SIGTERM and flushes world/event/canvas state (see server/src/index.ts).
            echo "Stopping Compose stack before backup and git update…"
            docker compose stop
            mkdir -p "$DEPLOY_ROOT/backups"
            BACKUP_TS="$(date -u +%Y%m%dT%H%M%SZ)"
            if [ -d "$DEPLOY_ROOT/data" ]; then
              echo "Archiving host data/ → backups/nspace-data-${BACKUP_TS}.tar.gz"
              tar -C "$DEPLOY_ROOT" -czf "$DEPLOY_ROOT/backups/nspace-data-${BACKUP_TS}.tar.gz" data
              ls -lh "$DEPLOY_ROOT/backups/nspace-data-${BACKUP_TS}.tar.gz"
            else
              echo "WARNING: $DEPLOY_ROOT/data not found — skipping pre-deploy backup (first deploy?)."
            fi
            git fetch origin main
            git reset --hard origin/main
            docker compose build --pull
            docker compose up -d --remove-orphans
            docker image prune -f
